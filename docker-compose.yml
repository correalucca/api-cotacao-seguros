version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-cotacao-seguros
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: segurosdb
      MYSQL_USER: cotacao
      MYSQL_PASSWORD: cotacao123
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
