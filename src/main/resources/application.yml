spring:
  datasource:
    url: jdbc:mysql://localhost:3306/segurosdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: cotacao
    password: cotacao123
  jpa:
    hibernate:
      ddl-auto: none
      dialect: org.hibernate.dialect.MySQL8Dialect
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
jwt:
  secret: chave-super-secreta-api-cotacao-seguros-2024-hs256
  expiration-ms: 7200000

logging:
  level:
    com.cotacao.seguros: INFO
    org.springframework.security: INFO

server:
  port: 8080
