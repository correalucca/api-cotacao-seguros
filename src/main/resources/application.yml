spring:
  datasource:
    url: jdbc:h2:mem:segurosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.H2Dialect
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
jwt:
  secret: chave-super-secreta-api-cotacao-seguros-2024-hs256
  expiration-ms: 7200000

logging:
  level:
    com.cotacao.seguros: INFO
    org.springframework.security: INFO

server:
  port: 8080

